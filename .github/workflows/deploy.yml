name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Pull latest code
        run: git -C ~/MyEPG pull origin main

      - name: Install dependencies
        run: ~/MyEPG/venv/bin/pip install -r ~/MyEPG/requirements.txt --quiet

      - name: Restart bot
        run: sudo systemctl restart myepg

      - name: Check status
        run: sudo systemctl status myepg --no-pager
